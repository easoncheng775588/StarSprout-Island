spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/k12_learning_game?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
